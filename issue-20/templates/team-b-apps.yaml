apiVersion: v1
kind: Pod
metadata:
  name: api
  namespace: team-b
  labels:
    app: api
spec:
  containers:
  - name: api
    image: nginx:alpine
    ports:
    - containerPort: 80
---
apiVersion: v1
kind: Service
metadata:
  name: api
  namespace: team-b
spec:
  selector:
    app: api
  ports:
  - port: 8080
    targetPort: 80
---
apiVersion: v1
kind: Pod
metadata:
  name: web
  namespace: team-b
  labels:
    app: web
spec:
  containers:
  - name: web
    image: nginx:alpine
    ports:
    - containerPort: 80
---
apiVersion: v1
kind: Service
metadata:
  name: web
  namespace: team-b
spec:
  selector:
    app: web
  ports:
  - port: 80
    targetPort: 80
